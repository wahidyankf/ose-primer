coverage:
  status:
    project:
      default:
        target: 85%

# Exclude pure type-definition files — Go's coverage tool never
# instruments them (no executable statements), so they don't appear
# in cover.out. Without this, Codecov counts every line as uncovered
# and reports ~7% lower than go-test-coverage's statement coverage.
ignore:
  - "**/types.go"

flags:
  rhino-cli:
    paths:
      - apps/rhino-cli/
    carryforward: true
  ayokoding-cli:
    paths:
      - apps/ayokoding-cli/
    carryforward: true
  oseplatform-cli:
    paths:
      - apps/oseplatform-cli/
    carryforward: true
  demo-be-java-springboot:
    paths:
      - apps/demo-be-java-springboot/
    carryforward: true
  organiclever-web:
    paths:
      - apps/organiclever-web/
    carryforward: true
  golang-commons:
    paths:
      - libs/golang-commons/
    carryforward: true
  hugo-commons:
    paths:
      - libs/hugo-commons/
    carryforward: true
  demo-be-elixir-phoenix:
    paths:
      - apps/demo-be-elixir-phoenix/
    carryforward: true
