# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d crud-be-rust-axum
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  crud-be-rust-axum:
    environment:
      - RUST_LOG=warn
      - DATABASE_URL=postgresql://crud_be_rust_axum:crud_be_rust_axum@crud-be-rust-axum-db:5432/crud_be_rust_axum
      - ENABLE_TEST_API=true

  crud-fe:
    build:
      context: ../../..
      dockerfile: apps/crud-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://crud-be-rust-axum:8201
    container_name: crud-be-rsax-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      crud-be-rust-axum:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crud-be-rust-axum-network
