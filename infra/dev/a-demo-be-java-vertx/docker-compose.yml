# Local Development Environment for Demo Backend (JAVX — Java/Vert.x)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  a-demo-be-java-vertx-db:
    image: postgres:17-alpine
    container_name: a-demo-be-java-vertx-db
    environment:
      POSTGRES_DB: a_demo_be_java_vertx
      POSTGRES_USER: ${POSTGRES_USER:-a_demo_be_java_vertx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a_demo_be_java_vertx}
    ports:
      - "5432:5432"
    volumes:
      - a-demo-be-java-vertx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a_demo_be_java_vertx} -d a_demo_be_java_vertx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - a-demo-be-java-vertx-network

  a-demo-be-java-vertx:
    build:
      context: ../../../apps/a-demo-be-java-vertx
      dockerfile: ../../infra/dev/a-demo-be-java-vertx/Dockerfile.be.dev
    container_name: a-demo-be-java-vertx
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/a-demo-be-java-vertx:/workspace:rw
      - ../../../specs/apps/a-demo/be/gherkin:/specs/apps/a-demo/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      a-demo-be-java-vertx-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://a_demo_be_java_vertx:a_demo_be_java_vertx@a-demo-be-java-vertx-db:5432/a_demo_be_java_vertx
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: mvn compile exec:java

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s

    restart: unless-stopped
    networks:
      - a-demo-be-java-vertx-network

networks:
  a-demo-be-java-vertx-network:
    driver: bridge
    name: a-demo-be-java-vertx-network

volumes:
  a-demo-be-java-vertx-db-data:
