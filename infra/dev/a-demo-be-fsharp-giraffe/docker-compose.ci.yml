# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d a-demo-be-fsharp-giraffe
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  a-demo-be-fsharp-giraffe:
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ENABLE_TEST_API=true

  demo-fe:
    build:
      context: ../../..
      dockerfile: apps/a-demo-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://a-demo-be-fsharp-giraffe:8201
    container_name: a-demo-be-fsgi-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      a-demo-be-fsharp-giraffe:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - a-demo-be-fsharp-giraffe-network
