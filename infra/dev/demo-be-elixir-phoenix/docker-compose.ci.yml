# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d demo-be-elixir-phoenix
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  demo-be-elixir-phoenix-db:
    environment:
      POSTGRES_DB: demo_be_elixir_phoenix
      POSTGRES_USER: demo_be_elixir_phoenix
      POSTGRES_PASSWORD: demo_be_elixir_phoenix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_be_elixir_phoenix -d demo_be_elixir_phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  demo-be-elixir-phoenix:
    build:
      context: ../../..
      dockerfile: infra/dev/demo-be-elixir-phoenix/Dockerfile.be.ci
    volumes: !reset []
    command: ["sh", "-c", "mix deps.get && mix ecto.migrate && mix phx.server"]
    environment:
      - HEALTH_SHOW_DETAILS=false
      - ENABLE_TEST_API=true
      - MIX_ENV=dev
      - PORT=8201
      - DATABASE_URL=ecto://demo_be_elixir_phoenix:demo_be_elixir_phoenix@demo-be-elixir-phoenix-db:5432/demo_be_elixir_phoenix
      - APP_JWT_SECRET=change-me-in-dev-only-not-for-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s

  demo-fe:
    build:
      context: ../../..
      dockerfile: apps/demo-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://demo-be-elixir-phoenix:8201
    container_name: demo-be-exph-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      demo-be-elixir-phoenix:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - demo-be-elixir-phoenix-network
