# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d crud-be-java-vertx
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d
#
# Runs the pre-built fat JAR directly (no Maven compile at startup).

services:
  crud-be-java-vertx:
    command: ["java", "-jar", "/app/app.jar"]
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://crud_be_java_vertx:crud_be_java_vertx@crud-be-java-vertx-db:5432/crud_be_java_vertx
      - ENABLE_TEST_API=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  crud-fe:
    build:
      context: ../../..
      dockerfile: apps/crud-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://crud-be-java-vertx:8201
    container_name: crud-be-javx-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      crud-be-java-vertx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crud-be-java-vertx-network
