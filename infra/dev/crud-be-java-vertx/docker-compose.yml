# Local Development Environment for Demo Backend (JAVX — Java/Vert.x)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  crud-be-java-vertx-db:
    image: postgres:17-alpine
    container_name: crud-be-java-vertx-db
    environment:
      POSTGRES_DB: crud_be_java_vertx
      POSTGRES_USER: ${POSTGRES_USER:-crud_be_java_vertx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crud_be_java_vertx}
    ports:
      - "5432:5432"
    volumes:
      - crud-be-java-vertx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crud_be_java_vertx} -d crud_be_java_vertx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-be-java-vertx-network

  crud-be-java-vertx:
    build:
      context: ../../../apps/crud-be-java-vertx
      dockerfile: ../../infra/dev/crud-be-java-vertx/Dockerfile.be.dev
    container_name: crud-be-java-vertx
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/crud-be-java-vertx:/workspace:rw
      - ../../../specs/apps/crud/be/gherkin:/specs/apps/crud/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      crud-be-java-vertx-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://crud_be_java_vertx:crud_be_java_vertx@crud-be-java-vertx-db:5432/crud_be_java_vertx
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: mvn compile exec:java

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s

    restart: unless-stopped
    networks:
      - crud-be-java-vertx-network

networks:
  crud-be-java-vertx-network:
    driver: bridge
    name: crud-be-java-vertx-network

volumes:
  crud-be-java-vertx-db-data:
