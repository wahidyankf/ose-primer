# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d crud-be-csharp-aspnetcore
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  crud-be-csharp-aspnetcore:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ENABLE_TEST_API=true

  crud-fe:
    build:
      context: ../../..
      dockerfile: apps/crud-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://crud-be-csharp-aspnetcore:8201
    container_name: crud-be-csas-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      crud-be-csharp-aspnetcore:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crud-be-csharp-aspnetcore-network
