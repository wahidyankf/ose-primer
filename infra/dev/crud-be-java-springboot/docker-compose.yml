# Local Development Environment for CRUD Backend
# Backend: Spring Boot with auto-reload via Spring Boot DevTools

services:
  crud-be-db:
    image: postgres:17-alpine
    container_name: crud-be-db
    environment:
      POSTGRES_DB: crud_be
      POSTGRES_USER: ${POSTGRES_USER:-demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    ports:
      - "5432:5432"
    volumes:
      - crud-be-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo} -d crud_be"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-be-network

  crud-be-java-springboot:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: crud-be-java-springboot
    working_dir: /workspace

    # Mount full source code for development.
    # specs/ is mounted so Maven antrun can copy feature files to the test classpath
    # (pom.xml resolves ${project.basedir}/../../specs/apps/crud/be/gherkin → /specs/apps/crud/be/gherkin).
    volumes:
      - ../../../apps/crud-be-java-springboot:/workspace:rw
      - ../../../specs/apps/crud/be/gherkin:/specs/apps/crud/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      crud-be-db:
        condition: service_healthy

    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8201
      - MAVEN_OPTS=${MAVEN_OPTS:--Xmx512m}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://crud-be-db:5432/crud_be
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-demo}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-demo}
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    # Run Spring Boot with DevTools for auto-reload
    # Maven is pre-installed in the custom dev image (see Dockerfile.be.dev)
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Extended for Maven dependency download on first run

    restart: unless-stopped
    networks:
      - crud-be-network

networks:
  crud-be-network:
    driver: bridge
    name: crud-be-network

volumes:
  crud-be-db-data:
