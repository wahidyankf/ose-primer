# Local Development Environment for Demo Backend (CJPD — Clojure/Pedestal)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  crud-be-clojure-pedestal-db:
    image: postgres:17-alpine
    container_name: crud-be-clojure-pedestal-db
    environment:
      POSTGRES_DB: crud_be_clojure_pedestal
      POSTGRES_USER: ${POSTGRES_USER:-crud_be_clojure_pedestal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crud_be_clojure_pedestal}
    ports:
      - "5432:5432"
    volumes:
      - crud-be-clojure-pedestal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crud_be_clojure_pedestal} -d crud_be_clojure_pedestal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-be-clojure-pedestal-network

  crud-be-clojure-pedestal:
    build:
      context: ../../..
      dockerfile: infra/dev/crud-be-clojure-pedestal/Dockerfile.be.dev
    container_name: crud-be-clojure-pedestal
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/crud-be-clojure-pedestal:/workspace:rw
      - ../../../specs/apps/crud/be/gherkin:/specs/apps/crud/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      crud-be-clojure-pedestal-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=jdbc:postgresql://crud-be-clojure-pedestal-db:5432/crud_be_clojure_pedestal
      - DB_USER=crud_be_clojure_pedestal
      - DB_PASSWORD=crud_be_clojure_pedestal
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: clojure -M -m crud-be-cjpd.main

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - crud-be-clojure-pedestal-network

networks:
  crud-be-clojure-pedestal-network:
    driver: bridge
    name: crud-be-clojure-pedestal-network

volumes:
  crud-be-clojure-pedestal-db-data:
