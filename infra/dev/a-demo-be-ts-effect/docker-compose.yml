# Local Development Environment for Demo Backend (TSEX — TypeScript/Effect)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  a-demo-be-ts-effect-db:
    image: postgres:17-alpine
    container_name: a-demo-be-ts-effect-db
    environment:
      POSTGRES_DB: a_demo_be_ts_effect
      POSTGRES_USER: ${POSTGRES_USER:-a_demo_be_ts_effect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a_demo_be_ts_effect}
    ports:
      - "5432:5432"
    volumes:
      - a-demo-be-ts-effect-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a_demo_be_ts_effect} -d a_demo_be_ts_effect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - a-demo-be-ts-effect-network

  a-demo-be-ts-effect:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: a-demo-be-ts-effect

    # Mount app source
    volumes:
      - ../../../apps/a-demo-be-ts-effect:/workspace:rw

    ports:
      - "8201:8201"

    depends_on:
      a-demo-be-ts-effect-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://a_demo_be_ts_effect:a_demo_be_ts_effect@a-demo-be-ts-effect-db:5432/a_demo_be_ts_effect
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    restart: unless-stopped
    networks:
      - a-demo-be-ts-effect-network

networks:
  a-demo-be-ts-effect-network:
    driver: bridge
    name: a-demo-be-ts-effect-network

volumes:
  a-demo-be-ts-effect-db-data:
