services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_fs_ts_nextjs
      POSTGRES_USER: crud_fs_ts_nextjs
      POSTGRES_PASSWORD: crud_fs_ts_nextjs
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_fs_ts_nextjs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crud-fs

  app:
    build:
      context: ../../../
      dockerfile: apps/crud-fs-ts-nextjs/Dockerfile
    container_name: crud-fs-ts-nextjs
    environment:
      DATABASE_URL: postgresql://crud_fs_ts_nextjs:crud_fs_ts_nextjs@db:5432/crud_fs_ts_nextjs
      APP_JWT_SECRET: dev-jwt-secret-at-least-32-chars-long!!
      ENABLE_TEST_API: "true"
    ports:
      - "3401:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crud-fs

volumes:
  pgdata:

networks:
  crud-fs:
