# Local Development Environment for Demo Backend (GOGN — Go/Gin)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-gogn-db:
    image: postgres:17-alpine
    container_name: demo-be-gogn-db
    environment:
      POSTGRES_DB: demo_be_gogn
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_gogn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_gogn}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-gogn-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_gogn} -d demo_be_gogn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-gogn-network

  demo-be-gogn:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-gogn
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-gogn:/workspace:rw
      - ../../../specs/apps/demo-be/gherkin:/specs/apps/demo-be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-gogn-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://demo_be_gogn:demo_be_gogn@demo-be-gogn-db:5432/demo_be_gogn
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: go run ./cmd/server

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped
    networks:
      - demo-be-gogn-network

networks:
  demo-be-gogn-network:
    driver: bridge
    name: demo-be-gogn-network

volumes:
  demo-be-gogn-db-data:
