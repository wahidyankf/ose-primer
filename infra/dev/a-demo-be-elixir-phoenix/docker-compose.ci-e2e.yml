# Standalone CI E2E compose — does NOT extend docker-compose.yml.
# Pre-compiles everything in Dockerfile.be.ci so container startup is instant.

services:
  a-demo-be-elixir-phoenix-db:
    image: postgres:17-alpine
    container_name: a-demo-be-elixir-phoenix-db
    environment:
      POSTGRES_DB: a_demo_be_elixir_phoenix
      POSTGRES_USER: a_demo_be_elixir_phoenix
      POSTGRES_PASSWORD: a_demo_be_elixir_phoenix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a_demo_be_elixir_phoenix -d a_demo_be_elixir_phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - a-demo-be-elixir-phoenix-network

  a-demo-be-elixir-phoenix:
    build:
      context: ../../..
      dockerfile: infra/dev/a-demo-be-elixir-phoenix/Dockerfile.be.ci
    container_name: a-demo-be-elixir-phoenix
    ports:
      - "8201:8201"
    depends_on:
      a-demo-be-elixir-phoenix-db:
        condition: service_healthy
    environment:
      - MIX_ENV=dev
      - PORT=8201
      - DATABASE_URL=ecto://a_demo_be_elixir_phoenix:a_demo_be_elixir_phoenix@a-demo-be-elixir-phoenix-db:5432/a_demo_be_elixir_phoenix
      - APP_JWT_SECRET=change-me-in-dev-only-not-for-production
      - HEALTH_SHOW_DETAILS=false
      - ENABLE_TEST_API=true
    command: ["sh", "-c", "mix ecto.migrate && mix phx.server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s
    networks:
      - a-demo-be-elixir-phoenix-network

  demo-fe:
    build:
      context: ../../..
      dockerfile: apps/a-demo-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://a-demo-be-elixir-phoenix:8201
    container_name: a-demo-be-exph-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      a-demo-be-elixir-phoenix:
        condition: service_healthy
    networks:
      - a-demo-be-elixir-phoenix-network

networks:
  a-demo-be-elixir-phoenix-network:
    driver: bridge
    name: a-demo-be-elixir-phoenix-network
