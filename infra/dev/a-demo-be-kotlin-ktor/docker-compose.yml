# Local Development Environment for Demo Backend (KTKT — Kotlin/Ktor)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  a-demo-be-kotlin-ktor-db:
    image: postgres:17-alpine
    container_name: a-demo-be-kotlin-ktor-db
    environment:
      POSTGRES_DB: a_demo_be_kotlin_ktor
      POSTGRES_USER: ${POSTGRES_USER:-a_demo_be_kotlin_ktor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a_demo_be_kotlin_ktor}
    ports:
      - "5432:5432"
    volumes:
      - a-demo-be-kotlin-ktor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a_demo_be_kotlin_ktor} -d a_demo_be_kotlin_ktor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - a-demo-be-kotlin-ktor-network

  a-demo-be-kotlin-ktor:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: a-demo-be-kotlin-ktor
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/a-demo-be-kotlin-ktor:/workspace:rw
      - ../../../specs/apps/a-demo/be/gherkin:/specs/apps/a-demo/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      a-demo-be-kotlin-ktor-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=jdbc:postgresql://a-demo-be-kotlin-ktor-db:5432/a_demo_be_kotlin_ktor
      - DATABASE_USER=${POSTGRES_USER:-a_demo_be_kotlin_ktor}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-a_demo_be_kotlin_ktor}
      - JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: ./gradlew run

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - a-demo-be-kotlin-ktor-network

networks:
  a-demo-be-kotlin-ktor-network:
    driver: bridge
    name: a-demo-be-kotlin-ktor-network

volumes:
  a-demo-be-kotlin-ktor-db-data:
