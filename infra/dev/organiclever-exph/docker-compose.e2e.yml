# E2E override for demo-be-e2e Playwright tests
# Use with: docker compose -f docker-compose.yml -f docker-compose.e2e.yml
#
# Keeps the stack in production-equivalent mode during E2E.
# The health endpoint returns {"status":"UP"} without component details
# by default (Phoenix does not expose component details to anonymous callers).
services:
  organiclever-be-exph:
    environment:
      - HEALTH_SHOW_DETAILS=false
