# Local Development Environment for Demo Backend (PYFA — Python/FastAPI)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-pyfa-db:
    image: postgres:17-alpine
    container_name: demo-be-pyfa-db
    environment:
      POSTGRES_DB: demo_be_pyfa
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_pyfa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_pyfa}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-pyfa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_pyfa} -d demo_be_pyfa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-pyfa-network

  demo-be-pyfa:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-pyfa
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-pyfa:/workspace:rw
      - ../../../specs/apps/demo-be/gherkin:/specs/apps/demo-be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-pyfa-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://demo_be_pyfa:demo_be_pyfa@demo-be-pyfa-db:5432/demo_be_pyfa
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: sh -c "uv sync && uv run uvicorn demo_be_pyfa.main:app --host 0.0.0.0 --port 8201"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped
    networks:
      - demo-be-pyfa-network

networks:
  demo-be-pyfa-network:
    driver: bridge
    name: demo-be-pyfa-network

volumes:
  demo-be-pyfa-db-data:
