# Local Development Environment for CRUD Frontend
# Stack: Frontend + Backend (Go/Gin) + Database (PostgreSQL)

services:
  crud-be-db:
    image: postgres:17-alpine
    container_name: crud-fe-tsnx-db
    environment:
      POSTGRES_DB: crud_be
      POSTGRES_USER: ${POSTGRES_USER:-demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    ports:
      - "5432:5432"
    volumes:
      - crud-fe-tsnx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo} -d crud_be"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-fe-tsnx-network

  crud-be:
    build:
      context: ../../../apps/crud-be-golang-gin
      dockerfile: Dockerfile
    container_name: crud-fe-tsnx-be
    ports:
      - "8201:8201"
    depends_on:
      crud-be-db:
        condition: service_healthy
    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://${POSTGRES_USER:-demo}:${POSTGRES_PASSWORD:-demo}@crud-be-db:5432/crud_be
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}
      - ENABLE_TEST_API=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-fe-tsnx-network

  crud-fe:
    build:
      context: ../../..
      dockerfile: apps/crud-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://crud-be:8201
    container_name: crud-fe-tsnx
    ports:
      - "3301:3301"
    depends_on:
      crud-be:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://crud-be:8201
    restart: unless-stopped
    networks:
      - crud-fe-tsnx-network

networks:
  crud-fe-tsnx-network:
    driver: bridge

volumes:
  crud-fe-tsnx-db-data:
