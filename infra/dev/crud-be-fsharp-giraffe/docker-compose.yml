# Local Development Environment for Demo Backend (FSGI — F#/Giraffe)
# Mutually exclusive with crud-be-java-springboot and crud-be-elixir-phoenix — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  crud-be-fsharp-giraffe-db:
    image: postgres:17-alpine
    container_name: crud-be-fsharp-giraffe-db
    environment:
      POSTGRES_DB: crud_be_fsharp_giraffe
      POSTGRES_USER: ${POSTGRES_USER:-crud_be_fsharp_giraffe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crud_be_fsharp_giraffe}
    ports:
      - "5432:5432"
    volumes:
      - crud-be-fsharp-giraffe-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crud_be_fsharp_giraffe} -d crud_be_fsharp_giraffe"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - crud-be-fsharp-giraffe-network

  crud-be-fsharp-giraffe:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: crud-be-fsharp-giraffe
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/crud-be-fsharp-giraffe:/workspace:rw
      - ../../../specs/apps/crud/be/gherkin:/specs/apps/crud/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      crud-be-fsharp-giraffe-db:
        condition: service_healthy

    environment:
      - DOTNET_ENVIRONMENT=Development
      - DATABASE_URL=Host=crud-be-fsharp-giraffe-db;Port=5432;Database=crud_be_fsharp_giraffe;Username=crud_be_fsharp_giraffe;Password=crud_be_fsharp_giraffe
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: dotnet run --project src/DemoBeFsgi/DemoBeFsgi.fsproj

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - crud-be-fsharp-giraffe-network

networks:
  crud-be-fsharp-giraffe-network:
    driver: bridge
    name: crud-be-fsharp-giraffe-network

volumes:
  crud-be-fsharp-giraffe-db-data:
