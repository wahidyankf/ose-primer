# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d crud-be-ts-effect
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  crud-be-ts-effect:
    environment:
      - APP_ENV=production
      - ENABLE_TEST_API=true

  crud-fe:
    build:
      context: ../../..
      dockerfile: apps/crud-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://crud-be-ts-effect:8201
    container_name: crud-be-tsex-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      crud-be-ts-effect:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crud-be-ts-effect-network
