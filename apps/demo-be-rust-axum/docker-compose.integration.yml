services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_be_rust
      POSTGRES_USER: demo_be_rust
      POSTGRES_PASSWORD: demo_be_rust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_be_rust -d demo_be_rust"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://demo_be_rust:demo_be_rust@postgres:5432/demo_be_rust"
    volumes:
      - ../../specs:/specs:ro
