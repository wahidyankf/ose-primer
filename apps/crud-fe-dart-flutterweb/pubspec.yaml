name: crud_fe_dart_flutterweb
description: Flutter Web frontend for demo expense tracking (alternative to crud-fe-ts-nextjs)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  web: ^1.1.1
  crud_contracts:
    path: ./generated-contracts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false
