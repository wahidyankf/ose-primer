<!doctype html>
<html lang="en">
  <head>
    <base href="$FLUTTER_BASE_HREF" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Demo Frontend - Flutter Web" />
    <title>Demo Frontend</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #333;
        background-color: #f5f7fa;
      }
      a {
        color: #1a73e8;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      h1,
      h2,
      h3 {
        margin-top: 0;
      }
      input,
      button,
      select,
      textarea {
        font-family: inherit;
        font-size: inherit;
      }
      /* Flutter-view overlay: we render pure DOM, so disable event interception */
      flutter-view {
        pointer-events: none !important;
      }
      /* Flutter accessibility placeholder: hide to prevent Playwright strict-mode conflicts */
      flt-semantics-placeholder {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="flutter_bootstrap.js" defer></script>
  </body>
</html>
