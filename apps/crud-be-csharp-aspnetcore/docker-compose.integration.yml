services:
  postgres:
    image: postgres:17.10-alpine3.22
    environment:
      POSTGRES_DB: crud_be_csas_test
      POSTGRES_USER: crud_be_csas
      POSTGRES_PASSWORD: crud_be_csas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_be_csas -d crud_be_csas_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../..
      dockerfile: apps/crud-be-csharp-aspnetcore/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=crud_be_csas_test;Username=crud_be_csas;Password=crud_be_csas"
      CRUD_BE_CSHARP_ASPNETCORE_JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
      CRUD_BE_CSHARP_ASPNETCORE_PORT: "8201"
    volumes:
      - ../../specs:/specs:ro
