build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongParameterList:
    active: true
    functionThreshold: 12
    constructorThreshold: 12
    ignoreAnnotated:
      - "io.cucumber.java.en.Given"
      - "io.cucumber.java.en.When"
      - "io.cucumber.java.en.Then"
      - "io.cucumber.java.en.And"
  LongMethod:
    active: true
    threshold: 80
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
  CyclomaticComplexMethod:
    active: true
    threshold: 20

naming:
  FunctionNaming:
    active: true
    excludes: ["**/test/**", "**/integration/**"]
    functionPattern: "([a-z][a-zA-Z0-9]*)"
  ConstructorParameterNaming:
    active: false

style:
  MagicNumber:
    active: false
  ThrowsCount:
    active: false
  ReturnCount:
    active: true
    max: 8
    excludedFunctions:
      - "validatePassword"
      - "validateEmail"
      - "validateUsername"
      - "validateDisplayName"
      - "validateCurrency"
      - "validateUnit"
      - "getArraySize"
    excludes: ["**/test/**"]
  WildcardImport:
    active: true
    excludeImports:
      - "io.ktor.*"
      - "org.jetbrains.exposed.*"
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludes: ["**/test/**"]
  UnusedPrivateProperty:
    active: false
  UnusedPrivateMember:
    active: true
    excludes: ["**/test/**"]

exceptions:
  TooGenericExceptionCaught:
    active: false

potential-bugs:
  UnsafeCallOnNullableType:
    active: false
