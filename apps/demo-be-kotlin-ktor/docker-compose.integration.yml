services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_be_kotlin_ktor_test
      POSTGRES_USER: demo_be_kotlin_ktor
      POSTGRES_PASSWORD: demo_be_kotlin_ktor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_be_kotlin_ktor -d demo_be_kotlin_ktor_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/demo_be_kotlin_ktor_test?user=demo_be_kotlin_ktor&password=demo_be_kotlin_ktor"
      JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
    volumes:
      - ../../specs:/specs:ro
