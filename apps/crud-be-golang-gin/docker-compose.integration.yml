services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_be_gin_test
      POSTGRES_USER: crud_be_gin
      POSTGRES_PASSWORD: crud_be_gin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_be_gin -d crud_be_gin_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://crud_be_gin:crud_be_gin@postgres:5432/crud_be_gin_test?sslmode=disable"
    volumes:
      - ../../specs:/specs:ro
