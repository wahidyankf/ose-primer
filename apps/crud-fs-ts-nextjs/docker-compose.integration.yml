services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_fs_ts_nextjs_test
      POSTGRES_USER: crud_fs_ts_nextjs_test
      POSTGRES_PASSWORD: crud_fs_ts_nextjs_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_fs_ts_nextjs_test"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - test

  test-runner:
    build:
      context: ../..
      dockerfile: apps/crud-fs-ts-nextjs/Dockerfile.integration
    environment:
      DATABASE_URL: postgresql://crud_fs_ts_nextjs_test:crud_fs_ts_nextjs_test@db:5432/crud_fs_ts_nextjs_test
      APP_JWT_SECRET: test-jwt-secret-at-least-32-chars-long!!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - test

networks:
  test:
