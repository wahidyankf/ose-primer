services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_be_exph_test
      POSTGRES_USER: crud_be_exph
      POSTGRES_PASSWORD: crud_be_exph
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_be_exph -d crud_be_exph_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../..
      dockerfile: apps/crud-be-elixir-phoenix/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crud_be_exph:crud_be_exph@postgres:5432/crud_be_exph_test"
      APP_JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
    volumes:
      - ../../specs:/specs:ro
