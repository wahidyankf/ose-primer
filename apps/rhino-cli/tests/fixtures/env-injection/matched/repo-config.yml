env-contract:
  surfaces:
    - root: apps/demo-www
      kind: app
      lang: typescript
      allowlist: []

env-injection:
  apps:
    - app: demo-www
      keys-from: apps/demo-www/.env.example
      runtime: { local: env-local, local-ci: compose, production: vercel-production }
  ci-harness:
    - key: WEB_BASE_URL
      class: var
