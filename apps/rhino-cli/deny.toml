# cargo-deny configuration for rhino-cli.
# Run: cargo deny --manifest-path apps/rhino-cli/Cargo.toml check

[graph]
targets = []

[advisories]
# Deny crates with known security vulnerabilities.
version = 2
ignore = []

[licenses]
# Only allow OSI-approved permissive licences.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
]

[bans]
# Deny duplicate versions of the same crate.
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
