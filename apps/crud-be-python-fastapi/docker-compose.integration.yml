services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_be_fastapi_test
      POSTGRES_USER: crud_be_fastapi
      POSTGRES_PASSWORD: crud_be_fastapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_be_fastapi -d crud_be_fastapi_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crud_be_fastapi:crud_be_fastapi@postgres:5432/crud_be_fastapi_test"
      GHERKIN_ROOT: "/specs/apps/crud/be/gherkin"
    volumes:
      - ../../specs:/specs:ro
