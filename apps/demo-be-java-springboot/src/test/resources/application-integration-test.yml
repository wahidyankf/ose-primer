# Integration-test profile: real PostgreSQL via DATABASE_URL env var.
# Liquibase runs automatically on startup to create the schema.
# Repositories are real JPA beans — no mocks, no InMemoryDataStore.
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/demo_be_springboot_test?user=demo_be_springboot&password=demo_be_springboot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  main:
    allow-bean-definition-overriding: false

app:
  jwt:
    secret: integration-test-jwt-secret-at-least-32-chars-long
    expiration-ms: 3600000

management:
  endpoint:
    health:
      show-details: when-authorized
