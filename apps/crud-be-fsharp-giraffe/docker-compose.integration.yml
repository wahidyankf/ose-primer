services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crud_be_fsgi_test
      POSTGRES_USER: crud_be_fsgi
      POSTGRES_PASSWORD: crud_be_fsgi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_be_fsgi -d crud_be_fsgi_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../..
      dockerfile: apps/crud-be-fsharp-giraffe/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=crud_be_fsgi_test;Username=crud_be_fsgi;Password=crud_be_fsgi"
      APP_JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
    volumes:
      - ../../specs:/specs:ro
