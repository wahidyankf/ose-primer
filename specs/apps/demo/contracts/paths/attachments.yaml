/api/v1/expenses/{id}/attachments:
  post:
    operationId: uploadAttachment
    summary: Upload attachment to expense
    tags:
      - Attachments
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
    responses:
      "201":
        description: Attachment uploaded
        content:
          application/json:
            schema:
              $ref: "../schemas/attachment.yaml#/Attachment"
      "413":
        description: File too large
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "415":
        description: Unsupported file type
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
  get:
    operationId: listAttachments
    summary: List attachments for expense
    tags:
      - Attachments
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: List of attachments
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/attachment.yaml#/Attachment"

/api/v1/expenses/{id}/attachments/{aid}:
  delete:
    operationId: deleteAttachment
    summary: Delete attachment
    tags:
      - Attachments
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: aid
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        description: Attachment deleted
      "404":
        description: Attachment not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
