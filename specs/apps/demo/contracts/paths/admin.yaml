/api/v1/admin/users:
  get:
    operationId: listUsers
    summary: List all users (admin)
    tags:
      - Admin
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: size
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: Paginated user list
        content:
          application/json:
            schema:
              $ref: "../schemas/admin.yaml#/UserListResponse"
      "403":
        description: Not authorized (not admin)
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/admin/users/{id}/disable:
  post:
    operationId: disableUser
    summary: Disable a user account
    tags:
      - Admin
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/admin.yaml#/DisableRequest"
    responses:
      "200":
        description: User disabled
      "403":
        description: Not authorized
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/admin/users/{id}/enable:
  post:
    operationId: enableUser
    summary: Enable a disabled user account
    tags:
      - Admin
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: User enabled

/api/v1/admin/users/{id}/unlock:
  post:
    operationId: unlockUser
    summary: Unlock a locked user account
    tags:
      - Admin
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: User unlocked

/api/v1/admin/users/{id}/force-password-reset:
  post:
    operationId: forcePasswordReset
    summary: Force password reset for a user
    tags:
      - Admin
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Password reset forced
        content:
          application/json:
            schema:
              $ref: "../schemas/admin.yaml#/PasswordResetResponse"
