/api/v1/users/me:
  get:
    operationId: getCurrentUser
    summary: Get current user profile
    tags:
      - Users
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Current user profile
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/User"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
  patch:
    operationId: updateProfile
    summary: Update current user profile
    tags:
      - Users
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/user.yaml#/UpdateProfileRequest"
    responses:
      "200":
        description: Profile updated
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/User"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/users/me/password:
  post:
    operationId: changePassword
    summary: Change current user password
    tags:
      - Users
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/user.yaml#/ChangePasswordRequest"
    responses:
      "200":
        description: Password changed successfully
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Not authenticated or wrong old password
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/users/me/deactivate:
  post:
    operationId: deactivateAccount
    summary: Deactivate current user account
    tags:
      - Users
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Account deactivated
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
