ExpenseListResponse:
  type: object
  description: Paginated list of expenses
  required:
    - content
    - totalElements
    - totalPages
    - page
    - size
  properties:
    content:
      type: array
      items:
        $ref: "./expense.yaml#/Expense"
    totalElements:
      type: integer
    totalPages:
      type: integer
    page:
      type: integer
    size:
      type: integer
