TokenClaims:
  type: object
  description: Decoded JWT token claims
  required:
    - sub
    - iss
    - exp
    - iat
    - roles
  properties:
    sub:
      type: string
    iss:
      type: string
    exp:
      type: integer
    iat:
      type: integer
    roles:
      type: array
      items:
        type: string

JwkKey:
  type: object
  description: JSON Web Key
  required:
    - kty
    - kid
    - use
    - "n"
    - e
  properties:
    kty:
      type: string
    kid:
      type: string
    use:
      type: string
    "n":
      type: string
    e:
      type: string

JwksResponse:
  type: object
  description: JSON Web Key Set
  required:
    - keys
  properties:
    keys:
      type: array
      items:
        $ref: "#/JwkKey"
