Attachment:
  type: object
  description: File attachment metadata
  required:
    - id
    - filename
    - contentType
    - size
    - createdAt
  properties:
    id:
      type: string
    filename:
      type: string
    contentType:
      type: string
    size:
      type: integer
    createdAt:
      type: string
      format: date-time
