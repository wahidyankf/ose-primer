/api/v1/expenses:
  post:
    operationId: createExpense
    summary: Create a new expense or income record
    tags:
      - Expenses
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/expense.yaml#/CreateExpenseRequest"
    responses:
      "201":
        description: Expense created
        content:
          application/json:
            schema:
              $ref: "../schemas/expense.yaml#/Expense"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
  get:
    operationId: listExpenses
    summary: List expenses with pagination
    tags:
      - Expenses
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: size
        in: query
        schema:
          type: integer
          default: 20
      - name: currency
        in: query
        schema:
          type: string
      - name: category
        in: query
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
          enum:
            - income
            - expense
    responses:
      "200":
        description: Paginated expense list
        content:
          application/json:
            schema:
              $ref: "../schemas/expense-list.yaml#/ExpenseListResponse"

/api/v1/expenses/{id}:
  get:
    operationId: getExpense
    summary: Get expense by ID
    tags:
      - Expenses
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Expense details
        content:
          application/json:
            schema:
              $ref: "../schemas/expense.yaml#/Expense"
      "404":
        description: Expense not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
  put:
    operationId: updateExpense
    summary: Update expense by ID
    tags:
      - Expenses
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/expense.yaml#/UpdateExpenseRequest"
    responses:
      "200":
        description: Expense updated
        content:
          application/json:
            schema:
              $ref: "../schemas/expense.yaml#/Expense"
      "404":
        description: Expense not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
  delete:
    operationId: deleteExpense
    summary: Delete expense by ID
    tags:
      - Expenses
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        description: Expense deleted
      "404":
        description: Expense not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/expenses/summary:
  get:
    operationId: getExpenseSummary
    summary: Get expense summary grouped by currency
    tags:
      - Expenses
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Expense summary by currency
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/report.yaml#/ExpenseSummary"
