/api/v1/reports/pl:
  get:
    operationId: getPLReport
    summary: Get profit and loss report
    tags:
      - Reports
    security:
      - bearerAuth: []
    parameters:
      - name: startDate
        in: query
        schema:
          type: string
          format: date
      - name: endDate
        in: query
        schema:
          type: string
          format: date
      - name: currency
        in: query
        schema:
          type: string
    responses:
      "200":
        description: Profit and loss report
        content:
          application/json:
            schema:
              $ref: "../schemas/report.yaml#/PLReport"
