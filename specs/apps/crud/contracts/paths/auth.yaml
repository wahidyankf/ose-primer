/api/v1/auth/register:
  post:
    operationId: register
    summary: Register a new user
    tags:
      - Authentication
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/RegisterRequest"
    responses:
      "201":
        description: User registered successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/User"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "409":
        description: Username or email already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/auth/login:
  post:
    operationId: login
    summary: Authenticate with credentials
    tags:
      - Authentication
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/LoginRequest"
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/AuthTokens"
      "401":
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/auth/refresh:
  post:
    operationId: refreshToken
    summary: Refresh access token
    tags:
      - Authentication
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/RefreshRequest"
    responses:
      "200":
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/AuthTokens"
      "401":
        description: Invalid or expired refresh token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

/api/v1/auth/logout:
  post:
    operationId: logout
    summary: Logout current session
    tags:
      - Authentication
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Logged out successfully

/api/v1/auth/logout-all:
  post:
    operationId: logoutAll
    summary: Logout all sessions
    tags:
      - Authentication
    security:
      - bearerAuth: []
    responses:
      "200":
        description: All sessions logged out
