User:
  type: object
  description: User account details
  required:
    - id
    - username
    - email
    - displayName
    - status
    - roles
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    username:
      type: string
    email:
      type: string
      format: email
    displayName:
      type: string
    status:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - DISABLED
        - LOCKED
    roles:
      type: array
      items:
        type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

UpdateProfileRequest:
  type: object
  description: Update user display name
  required:
    - displayName
  properties:
    displayName:
      type: string

ChangePasswordRequest:
  type: object
  description: Change user password
  required:
    - oldPassword
    - newPassword
  properties:
    oldPassword:
      type: string
    newPassword:
      type: string
      minLength: 8
      maxLength: 128
