DisableRequest:
  type: object
  description: Request to disable a user account
  required:
    - reason
  properties:
    reason:
      type: string

PasswordResetResponse:
  type: object
  description: Response containing a temporary password reset token
  required:
    - token
  properties:
    token:
      type: string

UserListResponse:
  type: object
  description: Paginated list of users (admin view)
  required:
    - content
    - totalElements
    - totalPages
    - page
    - size
  properties:
    content:
      type: array
      items:
        $ref: "./user.yaml#/User"
    totalElements:
      type: integer
    totalPages:
      type: integer
    page:
      type: integer
    size:
      type: integer
