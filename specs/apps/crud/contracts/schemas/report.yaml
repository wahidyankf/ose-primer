CategoryBreakdown:
  type: object
  description: Breakdown of totals by category
  required:
    - category
    - type
    - total
  properties:
    category:
      type: string
    type:
      type: string
    total:
      type: string

ExpenseSummary:
  type: object
  description: Summary of expenses by currency
  required:
    - currency
    - totalIncome
    - totalExpense
    - net
    - categories
  properties:
    currency:
      type: string
    totalIncome:
      type: string
    totalExpense:
      type: string
    net:
      type: string
    categories:
      type: array
      items:
        $ref: "#/CategoryBreakdown"

PLReport:
  type: object
  description: Profit and loss report for a date range
  required:
    - startDate
    - endDate
    - currency
    - totalIncome
    - totalExpense
    - net
    - incomeBreakdown
    - expenseBreakdown
  properties:
    startDate:
      type: string
      format: date
    endDate:
      type: string
      format: date
    currency:
      type: string
    totalIncome:
      type: string
    totalExpense:
      type: string
    net:
      type: string
    incomeBreakdown:
      type: array
      items:
        $ref: "#/CategoryBreakdown"
    expenseBreakdown:
      type: array
      items:
        $ref: "#/CategoryBreakdown"
