LoginRequest:
  type: object
  description: Credentials for user authentication
  required:
    - username
    - password
  properties:
    username:
      type: string
      minLength: 5
      maxLength: 50
    password:
      type: string
      minLength: 8
      maxLength: 128

RegisterRequest:
  type: object
  description: New user registration payload
  required:
    - username
    - email
    - password
  properties:
    username:
      type: string
      minLength: 5
      maxLength: 50
    email:
      type: string
      format: email
    password:
      type: string
      minLength: 8
      maxLength: 128

RefreshRequest:
  type: object
  description: Token refresh request
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string

AuthTokens:
  type: object
  description: Authentication token pair returned on login or refresh
  required:
    - accessToken
    - refreshToken
    - tokenType
  properties:
    accessToken:
      type: string
    refreshToken:
      type: string
    tokenType:
      type: string
      example: Bearer
