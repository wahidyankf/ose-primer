/api/v1/tokens/claims:
  get:
    operationId: getTokenClaims
    summary: Get current token claims
    tags:
      - Tokens
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Token claims
        content:
          application/json:
            schema:
              $ref: "../schemas/token.yaml#/TokenClaims"

/.well-known/jwks.json:
  get:
    operationId: getJwks
    summary: Get JSON Web Key Set
    tags:
      - Tokens
    responses:
      "200":
        description: JWKS response
        content:
          application/json:
            schema:
              $ref: "../schemas/token.yaml#/JwksResponse"
