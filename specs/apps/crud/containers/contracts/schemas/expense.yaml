Expense:
  type: object
  description: An expense or income record
  required:
    - id
    - amount
    - currency
    - category
    - description
    - date
    - type
    - userId
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    amount:
      type: string
      description: Decimal amount as string for precision
    currency:
      type: string
    category:
      type: string
    description:
      type: string
    date:
      type: string
      format: date
    type:
      type: string
      enum:
        - income
        - expense
    quantity:
      type: number
      nullable: true
    unit:
      type: string
      nullable: true
    userId:
      type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

CreateExpenseRequest:
  type: object
  description: Create a new expense or income record
  required:
    - amount
    - currency
    - category
    - description
    - date
    - type
  properties:
    amount:
      type: string
    currency:
      type: string
    category:
      type: string
    description:
      type: string
    date:
      type: string
      format: date
    type:
      type: string
      enum:
        - income
        - expense
    quantity:
      type: number
      nullable: true
    unit:
      type: string
      nullable: true

UpdateExpenseRequest:
  type: object
  description: Update an existing expense or income record (all fields optional)
  properties:
    amount:
      type: string
    currency:
      type: string
    category:
      type: string
    description:
      type: string
    date:
      type: string
      format: date
    type:
      type: string
      enum:
        - income
        - expense
    quantity:
      type: number
      nullable: true
    unit:
      type: string
      nullable: true
