<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="High-fidelity mockup of the Expenses list with a New expense modal form (Option A)">
  <rect width="680" height="520" fill="#f1f5f9"/>
  <!-- card -->
  <rect x="24" y="24" width="632" height="472" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- header -->
  <text x="48" y="64" font-size="22" font-weight="700" fill="#0f172a">Expenses</text>
  <rect x="520" y="44" width="112" height="36" rx="9" fill="#4f46e5"/>
  <text x="576" y="67" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">+ New</text>

  <!-- table header -->
  <line x1="48" y1="92" x2="632" y2="92" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="48" y="116" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.4">DATE</text>
  <text x="170" y="116" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.4">DESCRIPTION</text>
  <text x="380" y="116" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.4">CATEGORY</text>
  <text x="540" y="116" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.4">AMOUNT</text>
  <line x1="48" y1="128" x2="632" y2="128" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- row 1 -->
  <text x="48" y="156" font-size="13.5" fill="#334155">2026-06-01</text>
  <text x="170" y="156" font-size="13.5" fill="#0f172a">Office lunch</text>
  <rect x="380" y="143" width="64" height="20" rx="10" fill="#eef2ff"/>
  <text x="412" y="157" font-size="11.5" font-weight="600" fill="#4f46e5" text-anchor="middle">Meals</text>
  <text x="540" y="156" font-size="13.5" font-weight="600" fill="#0f172a">$42.00</text>

  <!-- row 2 -->
  <line x1="48" y1="172" x2="632" y2="172" stroke="#f1f5f9" stroke-width="1"/>
  <text x="48" y="198" font-size="13.5" fill="#334155">2026-06-03</text>
  <text x="170" y="198" font-size="13.5" fill="#0f172a">Train pass</text>
  <rect x="380" y="185" width="74" height="20" rx="10" fill="#eef2ff"/>
  <text x="417" y="199" font-size="11.5" font-weight="600" fill="#4f46e5" text-anchor="middle">Transit</text>
  <text x="540" y="198" font-size="13.5" font-weight="600" fill="#0f172a">$88.00</text>

  <!-- row 3 -->
  <line x1="48" y1="214" x2="632" y2="214" stroke="#f1f5f9" stroke-width="1"/>
  <text x="48" y="240" font-size="13.5" fill="#334155">2026-06-05</text>
  <text x="170" y="240" font-size="13.5" fill="#0f172a">Cloud hosting</text>
  <rect x="380" y="227" width="84" height="20" rx="10" fill="#eef2ff"/>
  <text x="422" y="241" font-size="11.5" font-weight="600" fill="#4f46e5" text-anchor="middle">Software</text>
  <text x="540" y="240" font-size="13.5" font-weight="600" fill="#0f172a">$120.00</text>

  <!-- scrim -->
  <rect x="24" y="24" width="632" height="472" rx="14" fill="#0f172a" opacity="0.28"/>

  <!-- modal dialog -->
  <rect x="178" y="166" width="324" height="288" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="202" y="202" font-size="16" font-weight="700" fill="#0f172a">New expense</text>
  <line x1="202" y1="216" x2="478" y2="216" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- field: Date -->
  <text x="202" y="244" font-size="12" fill="#475569">Date</text>
  <rect x="202" y="250" width="276" height="30" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="214" y="270" font-size="13" fill="#0f172a">2026-06-08</text>

  <!-- field: Description -->
  <text x="202" y="302" font-size="12" fill="#475569">Description</text>
  <rect x="202" y="308" width="276" height="30" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- field: Category + Amount -->
  <text x="202" y="360" font-size="12" fill="#475569">Category</text>
  <rect x="202" y="366" width="132" height="30" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="214" y="386" font-size="13" fill="#0f172a">Meals</text>
  <path d="M316 378 l6 7 l6 -7" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="346" y="360" font-size="12" fill="#475569">Amount</text>
  <rect x="346" y="366" width="132" height="30" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="358" y="386" font-size="13" fill="#0f172a">0.00</text>
  <text x="452" y="386" font-size="12" fill="#64748b">USD</text>

  <!-- modal actions -->
  <rect x="316" y="416" width="76" height="30" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="354" y="436" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Cancel</text>
  <rect x="402" y="416" width="76" height="30" rx="8" fill="#4f46e5"/>
  <text x="440" y="436" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Save</text>
</svg>
