version: "2"

linters:
  # Explicit list: replaces implicit "default: standard" (errcheck, govet, ineffassign, staticcheck, unused)
  default: none
  enable:
    # Standard set
    - errcheck # unchecked errors in Go code
    - govet # suspicious constructs (go vet)
    - ineffassign # assignments to variables never used afterwards
    - staticcheck # staticcheck rules (SA*, ST*, S*, QF*)
    - unused # unused constants, variables, functions, and types
    # Nil-safety
    - forcetypeassert # forced type assertions that panic on wrong type
    - nilerr # returns nil even if err != nil was checked
    - nilnesserr # returns different nil error after err != nil check
    - nilnil # simultaneous return of nil error and invalid value
    # Exhaustiveness
    - exhaustive # exhaustive enum switch statements
    # Error-handling discipline
    - errorlint # forces errors.Is/errors.As; flags non-%w fmt.Errorf
    # Const-block hygiene
    - iotamixing # forbids mixing iota with non-iota constants in same block
    # Documentation style
    - godot # exported doc comments must end with a period
    - revive # exported rule: every exported symbol must have a doc comment
    # Exhaustiveness (sealed interfaces)
    - gochecksumtype # exhaustive type switches over sealed interfaces with //sumtype:decl
    # Unused code
    - unparam # unused function parameters (and params always called with same value)
    - wastedassign # assignments whose written value is never subsequently read

  settings:
    errcheck:
      check-type-assertions: false # covered by forcetypeassert linter
      check-blank: false
      disable-default-exclusions: false
      exclude-functions: []

    govet:
      disable-all: true # start from zero; list every active analyzer explicitly below
      enable:
        - appends
        - asmdecl
        - assign
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - defers
        - directive
        - errorsas
        - framepointer
        - hostport
        - httpresponse
        - ifaceassert
        - lostcancel
        - nilfunc
        - nilness # nil pointer dereferences and redundant nil checks (non-default)
        - printf
        - shift
        - sigchanyzer
        - slog
        - stdmethods
        - stdversion
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
        - unusedwrite # unused writes to struct fields / array elements
        - waitgroup

    staticcheck:
      checks:
        - all # enable all SA* (correctness), ST* (style), S* (simplify), QF* (quickfix)
        - -ST1013 # skip: HTTP status code constants (too strict for test code)
        - -ST1015 # skip: default case position in switch (purely cosmetic)
        - -ST1017 # skip: yoda conditions (rarely relevant in Go)
        - -ST1018 # skip: zero-width characters in strings (extremely niche)

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: false
      ignore-enum-members: ""
      ignore-enum-types: ""
      package-scope-only: false
      explicit-exhaustive-switch: false
      explicit-exhaustive-map: false
      default-case-required: false

    errorlint:
      errorf: true # require %w over %v when wrapping an error in fmt.Errorf
      errorf-multi: true # multiple %w wraps OK
      asserts: true # require errors.As over `err.(SomeErr)` type assertions
      comparison: true # require errors.Is over `err == sentinel`

    gochecksumtype:
      default-signifies-exhaustive: false # default case does NOT waive exhaustiveness

    godot:
      scope: declarations # only check doc comments on declarations (not inline comments)
      capital: false # don't require capital first letter
      period: true # require period at end

    revive:
      enable-all-rules: false # only the rules listed below are active
      rules:
        - name: exported
          severity: error
          disabled: false
          arguments:
            - "disableStutteringCheck" # don't flag type-name stuttering (e.g. doctor.DoctorResult)
        - name: package-comments
          severity: error
          disabled: false
