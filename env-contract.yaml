# env-contract.yaml — surface registry for rhino-cli env validate
#
# Each surface entry carries:
#   root      — path relative to repo root
#   kind      — "app" (active)
#   lang      — "rust", "typescript", or "fsharp" (app kind only)
#   allowlist — keys exempt from drift detection (framework-injected, test-only, etc.)
#
# ose-primer is a scaffold template repo; its CRUD demo apps use Docker Compose
# environment injection at test time rather than .env.example files.
# Surfaces will be registered here when apps adopt .env.example conventions.

surfaces: []
