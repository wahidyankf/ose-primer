name: "Setup Flutter"
description: "Install Flutter SDK with pub cache"
inputs:
  flutter-channel:
    description: "Flutter release channel"
    required: false
    default: "stable"
runs:
  using: "composite"
  steps:
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ inputs.flutter-channel }}

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          pub-${{ runner.os }}-

    # Note: flutter pub get must run AFTER codegen (generated-contracts dependency).
    # Callers are responsible for running flutter pub get after contract generation.
