name: "Setup .NET"
description: "Install .NET SDK, Fantomas, and fsharplint with NuGet cache"
inputs:
  dotnet-version:
    description: ".NET SDK version"
    required: false
    default: "10.0.x"
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.fsproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Install Fantomas
      shell: bash
      run: dotnet tool install -g fantomas

    - name: Install fsharplint
      shell: bash
      run: dotnet tool install -g dotnet-fsharplint

    - name: Restore NuGet packages (all .NET projects)
      shell: bash
      run: |
        dotnet restore apps/crud-be-csharp-aspnetcore/src/DemoBeCsas/DemoBeCsas.csproj
        dotnet restore apps/crud-be-csharp-aspnetcore/tests/DemoBeCsas.Tests/DemoBeCsas.Tests.csproj
        dotnet restore apps/crud-be-fsharp-giraffe/src/DemoBeFsgi/DemoBeFsgi.fsproj
        dotnet restore apps/crud-be-fsharp-giraffe/tests/DemoBeFsgi.Tests/DemoBeFsgi.Tests.fsproj
