name: "Setup Rust"
description: "Install Rust toolchain pinned by rust-toolchain.toml, with cargo-llvm-cov and cargo cache"
inputs:
  rust-version:
    description: "Rust toolchain"
    required: false
    default: "stable"
runs:
  using: "composite"
  steps:
    - name: Setup Rust toolchain (rust-toolchain.toml takes precedence)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: clippy,rustfmt,llvm-tools-preview
        cache: false

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          apps/crud-be-rust-axum/target
          apps/rhino-cli/target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Install cargo-hack
      uses: taiki-e/install-action@cargo-hack

    # The root rust-toolchain.toml pins the default toolchain (kept in lockstep with
    # apps/rhino-cli/rust-toolchain.toml), so clippy/fmt run on the pinned channel even when invoked
    # with `--manifest-path` from the workspace root. Each `cargo hack check --rust-version` (run in
    # parallel across projects by `nx run-many`/`nx affected`) still races rustup to install the
    # same missing MSRV toolchain concurrently, corrupting the shared download dir
    # ("could not rename downloaded file ... No such file or directory"). Pre-install each pinned
    # rust-version sequentially so the parallel compat:min-version tasks only ever read a toolchain
    # that is already present.
    - name: Pre-install pinned MSRV toolchain(s) (avoids rustup download race under parallel cargo-hack)
      shell: bash
      run: |
        for v in $(grep -rhoP '^rust-version\s*=\s*"\K[^"]+' apps/*/Cargo.toml 2>/dev/null | sort -u); do
          rustup toolchain install "$v" --profile minimal
        done
