name: "Setup Rust"
description: "Install Rust toolchain and cargo-llvm-cov with cargo cache"
inputs:
  rust-version:
    description: "Rust toolchain"
    required: false
    default: "stable"
runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          apps/crud-be-rust-axum/target
          apps/rhino-cli/target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Install cargo-hack
      uses: taiki-e/install-action@cargo-hack

    # No rust-toolchain.toml pins the default toolchain, so it resolves to latest stable — never the
    # older `rust-version` floor each crate declares. Every `cargo hack check --rust-version` (run in
    # parallel across projects by `nx run-many`/`nx affected`) therefore races rustup to install the
    # same missing MSRV toolchain concurrently, corrupting the shared download dir
    # ("could not rename downloaded file ... No such file or directory"). Pre-install each pinned
    # rust-version sequentially so the parallel compat:min-version tasks only ever read a toolchain
    # that is already present.
    - name: Pre-install pinned MSRV toolchain(s) (avoids rustup download race under parallel cargo-hack)
      shell: bash
      run: |
        for v in $(grep -rhoP '^rust-version\s*=\s*"\K[^"]+' apps/*/Cargo.toml 2>/dev/null | sort -u); do
          rustup toolchain install "$v" --profile minimal
        done
