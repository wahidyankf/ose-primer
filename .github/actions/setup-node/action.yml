name: "Setup Node.js"
description: "Install Node.js via Volta, run npm ci, and configure Nx cache"
inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "24"
runs:
  using: "composite"
  steps:
    - name: Install Node.js via Volta
      uses: volta-cli/action@v5

    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          npm-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Cache openapi-generator-cli jar
      uses: actions/cache@v5
      with:
        path: node_modules/@openapitools/openapi-generator-cli/versions
        key: openapi-generator-cli-${{ hashFiles('openapitools.json') }}

    - name: Pre-fetch openapi-generator-cli jar (sequential — avoids concurrent-download race across parallel codegen targets)
      shell: bash
      run: npx openapi-generator-cli version-manager set "$(node -p "require('./openapitools.json')['generator-cli'].version")"

    - name: Configure Nx cache
      uses: actions/cache@v5
      with:
        path: .nx/cache
        key: nx-${{ runner.os }}-${{ hashFiles('nx.json', 'package-lock.json') }}-${{ github.sha }}
        restore-keys: |
          nx-${{ runner.os }}-${{ hashFiles('nx.json', 'package-lock.json') }}-
          nx-${{ runner.os }}-
