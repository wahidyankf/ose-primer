name: "Setup Elixir"
description: "Install Elixir and OTP via setup-beam with deps and _build cache"
inputs:
  elixir-version:
    description: "Elixir version"
    required: false
    default: "1.19"
  otp-version:
    description: "Erlang/OTP version"
    required: false
    default: "27"
runs:
  using: "composite"
  steps:
    - name: Setup Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Cache Elixir deps and _build
      uses: actions/cache@v5
      with:
        path: |
          apps/crud-be-elixir-phoenix/deps
          apps/crud-be-elixir-phoenix/_build
          libs/elixir-openapi-codegen/deps
          libs/elixir-openapi-codegen/_build
          libs/elixir-cabbage/deps
          libs/elixir-cabbage/_build
          libs/elixir-gherkin/deps
          libs/elixir-gherkin/_build
        key: elixir-${{ runner.os }}-${{ inputs.elixir-version }}-${{ inputs.otp-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          elixir-${{ runner.os }}-${{ inputs.elixir-version }}-${{ inputs.otp-version }}-

    - name: Install hex and rebar
      shell: bash
      run: |
        mix local.hex --force
        mix local.rebar --force

    - name: Install Elixir deps (all mix projects)
      shell: bash
      run: |
        (cd apps/crud-be-elixir-phoenix && mix deps.get)
        (cd libs/elixir-openapi-codegen && mix deps.get)
        (cd libs/elixir-cabbage && mix deps.get)
        (cd libs/elixir-gherkin && mix deps.get)
