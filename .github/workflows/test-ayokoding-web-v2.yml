name: Test - AyoKoding Web v2

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/rhino-cli/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build rhino-cli (coverage validation)
        run: |
          cd apps/rhino-cli
          CGO_ENABLED=0 go build -o dist/rhino-cli main.go

      - name: Build ayokoding-cli (link validation)
        run: |
          cd apps/ayokoding-cli
          CGO_ENABLED=0 go build -o dist/ayokoding-cli main.go

      - name: Run test:quick
        run: npx nx run ayokoding-web-v2:test:quick

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: apps/ayokoding-web-v2/coverage/lcov.info
          flags: ayokoding-web-v2
          fail_ci_if_error: false

  e2e:
    name: E2E tests (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Build and start Docker
        run: |
          cd infra/dev/ayokoding-web-v2
          docker compose up -d --build
          # Wait for health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3101/api/trpc/meta.health > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (BE E2E)
        run: cd apps/ayokoding-web-v2-be-e2e && npx playwright install --with-deps chromium

      - name: Install Playwright browsers (FE E2E)
        run: cd apps/ayokoding-web-v2-fe-e2e && npx playwright install --with-deps chromium

      - name: Run BE E2E tests
        run: npx nx run ayokoding-web-v2-be-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3101

      - name: Run FE E2E tests
        run: npx nx run ayokoding-web-v2-fe-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3101

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports
          path: |
            apps/ayokoding-web-v2-be-e2e/playwright-report/
            apps/ayokoding-web-v2-fe-e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker
        if: always()
        run: |
          cd infra/dev/ayokoding-web-v2
          docker compose down
