name: Validate Markdown

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-markdown:
    name: Validate markdown gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Validate mermaid diagrams
        run: npx nx run rhino-cli-rust:validate:mermaid

      - name: Validate markdown links
        run: npx nx run rhino-cli-rust:validate:links

      - name: Validate heading hierarchy
        run: npx nx run rhino-cli-rust:validate:heading-hierarchy
