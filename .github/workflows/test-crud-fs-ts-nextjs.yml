name: Test - Crud FS (TypeScript/Next.js)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run crud-fs-ts-nextjs:spec-coverage
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npx nx run crud-fs-ts-nextjs:lint
  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: crud-fs-ts-nextjs
      language: typescript
      compose-file: apps/crud-fs-ts-nextjs/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: crud-fs-ts-nextjs
      language: typescript
      compose-dir: infra/dev/crud-fs-ts-nextjs
      compose-file: infra/dev/crud-fs-ts-nextjs/docker-compose.yml
      frontend-port: 3401
      backend-port: 3401
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://crud_fs_ts_nextjs:crud_fs_ts_nextjs@localhost:5438/crud_fs_ts_nextjs"
      skip-fe-e2e: true
