name: Test - Crud FE (TypeScript/Next.js)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 5"

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run crud-fe-ts-nextjs:spec-coverage
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Generate contract types
        run: |
          npx nx run crud-contracts:bundle
          npx nx run crud-fe-ts-nextjs:codegen
      - run: npx nx run crud-fe-ts-nextjs:lint
  e2e-fe:
    uses: ./.github/workflows/_reusable-frontend-e2e.yml
    with:
      frontend-name: crud-fe-ts-nextjs
      compose-dir: infra/dev/crud-fe-ts-nextjs
      extra-codegen-targets: "crud-fe-ts-tanstack-start:codegen"
