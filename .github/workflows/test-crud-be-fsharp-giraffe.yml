name: Test - Crud BE (F#/Giraffe)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 5"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet
      compose-file: apps/crud-be-fsharp-giraffe/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: crud-be-fsharp-giraffe
      language: dotnet
      compose-dir: infra/dev/crud-be-fsharp-giraffe
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://crud_be_fsharp_giraffe:crud_be_fsharp_giraffe@localhost:5432/crud_be_fsharp_giraffe"
