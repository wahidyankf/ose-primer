name: Test - Demo BE (TypeScript/Effect)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript
      compose-file: apps/demo-be-ts-effect/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: demo-be-ts-effect
      language: typescript
      compose-dir: infra/dev/demo-be-ts-effect
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://demo_be_ts_effect:demo_be_ts_effect@localhost:5432/demo_be_ts_effect"
      docker-owned-dirs: "apps/demo-be-ts-effect/node_modules"
