name: pr-quality-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NX_BASE: ${{ github.event_name == 'push' && github.event.before || format('origin/{0}', github.base_ref) }}
  NX_HEAD: ${{ github.sha }}

jobs:
  detect:
    name: Detect affected languages
    runs-on: ubuntu-latest
    outputs:
      has-ts: ${{ steps.detect.outputs.has-ts }}
      has-golang: ${{ steps.detect.outputs.has-golang }}
      has-jvm: ${{ steps.detect.outputs.has-jvm }}
      has-dotnet: ${{ steps.detect.outputs.has-dotnet }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
      has-elixir: ${{ steps.detect.outputs.has-elixir }}
      has-clojure: ${{ steps.detect.outputs.has-clojure }}
      has-dart: ${{ steps.detect.outputs.has-dart }}
      has-markdown: ${{ steps.detect.outputs.has-markdown }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: detect
        run: |
          AFFECTED=$(npx nx show projects --affected 2>/dev/null || echo "")
          {
            echo "has-ts=false"
            echo "has-golang=false"
            echo "has-jvm=false"
            echo "has-dotnet=false"
            echo "has-python=false"
            echo "has-rust=false"
            echo "has-elixir=false"
            echo "has-clojure=false"
            echo "has-dart=false"
            echo "has-markdown=false"
          } >> "$GITHUB_OUTPUT"

          for project in $AFFECTED; do
            TAGS=$(npx nx show project "$project" --json 2>/dev/null | jq -r '.tags[]' 2>/dev/null || echo "")
            for tag in $TAGS; do
              case "$tag" in
                lang:ts) echo "has-ts=true" >> "$GITHUB_OUTPUT" ;;
                lang:golang) echo "has-golang=true" >> "$GITHUB_OUTPUT" ;;
                lang:java | lang:kotlin) echo "has-jvm=true" >> "$GITHUB_OUTPUT" ;;
                lang:fsharp | lang:csharp) echo "has-dotnet=true" >> "$GITHUB_OUTPUT" ;;
                lang:python) echo "has-python=true" >> "$GITHUB_OUTPUT" ;;
                lang:rust) echo "has-rust=true" >> "$GITHUB_OUTPUT" ;;
                lang:elixir) echo "has-elixir=true" >> "$GITHUB_OUTPUT" ;;
                lang:clojure) echo "has-clojure=true" >> "$GITHUB_OUTPUT" ;;
                lang:dart) echo "has-dart=true" >> "$GITHUB_OUTPUT" ;;
              esac
            done
          done

          CHANGED_FILES=$(git diff --name-only "$NX_BASE"...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED_FILES" | grep -q '\.md$'; then
            echo "has-markdown=true" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Auto-format affected (lint-staged)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Format affected files with the project formatters (lint-staged)
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          CHANGED=$(git diff --name-only --diff-filter=ACMR "origin/$GITHUB_BASE_REF...HEAD")
          if [ -n "$CHANGED" ]; then
            printf '%s' "$CHANGED" | tr '\n' '\0' | xargs -0 -r git add --
            npx lint-staged --no-stash
          fi
      - name: Commit formatting to the PR branch
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-format affected files (lint-staged)"
            git push origin "HEAD:$GITHUB_HEAD_REF"
          fi

  shellcheck:
    name: Shell lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: ShellCheck (warning threshold)
        run: |
          shellcheck --version
          files=$(git diff --diff-filter=ACM --name-only "$NX_BASE"...HEAD | grep '\.sh$' | grep -v 'husky/_/' | grep -v '^archived/' || true)
          if [ -z "$files" ]; then echo "No changed shell scripts — skipping"; exit 0; fi
          # shellcheck disable=SC2086
          shellcheck --severity=warning $files

  hadolint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: hadolint (warning threshold)
        run: |
          sudo curl -sSL -o /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --version
          files=$(git diff --diff-filter=ACM --name-only "$NX_BASE"...HEAD | grep -iE 'Dockerfile' | grep -vE '^archived/' || true)
          if [ -z "$files" ]; then echo "No changed Dockerfiles — skipping"; exit 0; fi
          # shellcheck disable=SC2086
          hadolint --failure-threshold warning $files

  actionlint:
    name: GitHub Actions lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: actionlint
        run: |
          curl -sSL -o download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash
          bash download-actionlint.bash 1.7.12
          files=$(git diff --diff-filter=ACM --name-only "$NX_BASE"...HEAD | grep '^\.github/workflows/.*\.yml$' || true)
          if [ -z "$files" ]; then echo "No changed workflow files — skipping"; exit 0; fi
          # shellcheck disable=SC2086
          ./actionlint -color $files

  typescript:
    name: TypeScript quality gate
    needs: detect
    if: needs.detect.outputs.has-ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - run: npx nx affected -t typecheck lint test:quick specs:behavior:coverage --exclude='tag:lang:golang,tag:lang:java,tag:lang:kotlin,tag:lang:fsharp,tag:lang:csharp,tag:lang:python,tag:lang:rust,tag:lang:elixir,tag:lang:clojure,tag:lang:dart'

  golang:
    name: Go quality gate
    needs: detect
    if: needs.detect.outputs.has-golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:golang' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:golang projects — skipping"
          fi

  jvm:
    name: JVM quality gate
    needs: detect
    if: needs.detect.outputs.has-jvm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-jvm
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:java,tag:lang:kotlin' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:java,tag:lang:kotlin projects — skipping"
          fi

  dotnet:
    name: .NET quality gate
    needs: detect
    if: needs.detect.outputs.has-dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-dotnet
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:fsharp,tag:lang:csharp' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:fsharp,tag:lang:csharp projects — skipping"
          fi

  python:
    name: Python quality gate
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-python
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:python' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:python projects — skipping"
          fi

  rust:
    name: Rust quality gate
    needs: detect
    if: needs.detect.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:rust' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:rust projects — skipping"
          fi

  elixir:
    name: Elixir quality gate
    needs: detect
    if: needs.detect.outputs.has-elixir == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-elixir
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:elixir' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:elixir projects — skipping"
          fi

  clojure:
    name: Clojure quality gate
    needs: detect
    if: needs.detect.outputs.has-clojure == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-clojure
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:clojure' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:clojure projects — skipping"
          fi

  dart:
    name: Dart quality gate
    needs: detect
    if: needs.detect.outputs.has-dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-flutter
      - run: |
          PROJECTS=$(npx nx show projects --affected --projects='tag:lang:dart' --json | jq -r 'join(",")')
          if [ -n "$PROJECTS" ]; then
            npx nx run-many -t typecheck lint test:quick specs:behavior:coverage -p "$PROJECTS"
          else
            echo "No affected tag:lang:dart projects — skipping"
          fi

  compat-min-version:
    name: Minimum version compatibility (all affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-python
      - run: npx nx affected -t compat:min-version

  markdown:
    name: Markdown quality gate
    needs: detect
    if: needs.detect.outputs.has-markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: npm run lint:md

  naming:
    name: Naming validators (agents + workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx run rhino-cli:naming:harness-validation
      - run: npx nx run rhino-cli:naming:workflows-validation

  instruction-size:
    name: Instruction-size budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx run rhino-cli:instruction-size:validation

  specs-gate:
    name: Specs gate (BDD+DDD validators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx run-many -t specs:structure-validation --projects=rhino-cli
      - run: npx nx run rhino-cli:specs:gherkin-cardinality-validation

  md-links:
    name: Markdown link validation (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: cargo run --release --quiet --manifest-path apps/rhino-cli/Cargo.toml -- md links validate --exclude plans/done

  readme-index:
    name: README index validation (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: cargo run --release --quiet --manifest-path apps/rhino-cli/Cargo.toml -- md readme-index validate

  harness-duplication:
    name: Harness duplication validation (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: cargo run --release --quiet --manifest-path apps/rhino-cli/Cargo.toml -- harness duplication validate

  governance:
    name: Governance validators (vendor audit + license)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: cargo run --release --quiet --manifest-path apps/rhino-cli/Cargo.toml -- repo-governance vendor validate repo-governance/
      - run: cargo run --release --quiet --manifest-path apps/rhino-cli/Cargo.toml -- convention license validate

  quality-gate:
    name: Quality gate
    needs:
      [
        detect,
        shellcheck,
        hadolint,
        actionlint,
        typescript,
        golang,
        jvm,
        dotnet,
        python,
        rust,
        elixir,
        clojure,
        dart,
        compat-min-version,
        markdown,
        naming,
        instruction-size,
        specs-gate,
        md-links,
        readme-index,
        harness-duplication,
        governance,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all gates
        run: |
          echo "Checking quality gate results..."
          # A skipped job is OK (language not affected). Only an actual failure blocks.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more quality gate jobs failed"
            exit 1
          fi
          echo "All quality gates passed"
