name: PR - Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    name: Detect affected languages
    runs-on: ubuntu-latest
    outputs:
      has-ts: ${{ steps.detect.outputs.has-ts }}
      has-golang: ${{ steps.detect.outputs.has-golang }}
      has-jvm: ${{ steps.detect.outputs.has-jvm }}
      has-dotnet: ${{ steps.detect.outputs.has-dotnet }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
      has-elixir: ${{ steps.detect.outputs.has-elixir }}
      has-clojure: ${{ steps.detect.outputs.has-clojure }}
      has-dart: ${{ steps.detect.outputs.has-dart }}
      has-markdown: ${{ steps.detect.outputs.has-markdown }}
    env:
      # For push events github.base_ref is empty, so fall back to HEAD~1 to
      # compare the pushed commit against its immediate parent.
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: detect
        run: |
          AFFECTED=$(npx nx show projects --affected 2>/dev/null || echo "")
          # Check language tags for affected projects
          {
            echo "has-ts=false"
            echo "has-golang=false"
            echo "has-jvm=false"
            echo "has-dotnet=false"
            echo "has-python=false"
            echo "has-rust=false"
            echo "has-elixir=false"
            echo "has-clojure=false"
            echo "has-dart=false"
            echo "has-markdown=false"
          } >> "$GITHUB_OUTPUT"

          for project in $AFFECTED; do
            TAGS=$(npx nx show project "$project" --json 2>/dev/null | jq -r '.tags[]' 2>/dev/null || echo "")
            for tag in $TAGS; do
              case "$tag" in
                lang:ts) echo "has-ts=true" >> "$GITHUB_OUTPUT" ;;
                lang:golang) echo "has-golang=true" >> "$GITHUB_OUTPUT" ;;
                lang:java|lang:kotlin) echo "has-jvm=true" >> "$GITHUB_OUTPUT" ;;
                lang:fsharp|lang:csharp) echo "has-dotnet=true" >> "$GITHUB_OUTPUT" ;;
                lang:python) echo "has-python=true" >> "$GITHUB_OUTPUT" ;;
                lang:rust) echo "has-rust=true" >> "$GITHUB_OUTPUT" ;;
                lang:elixir) echo "has-elixir=true" >> "$GITHUB_OUTPUT" ;;
                lang:clojure) echo "has-clojure=true" >> "$GITHUB_OUTPUT" ;;
                lang:dart) echo "has-dart=true" >> "$GITHUB_OUTPUT" ;;
              esac
            done
          done

          # Check for markdown changes (NX_BASE already set correctly for both PR and push)
          CHANGED_FILES=$(git diff --name-only "${NX_BASE}"...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED_FILES" | grep -q '\.md$'; then
            echo "has-markdown=true" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Format check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: npx prettier --check .

  typescript:
    name: TypeScript quality gate
    needs: detect
    if: needs.detect.outputs.has-ts == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --exclude='tag:lang:golang,tag:lang:java,tag:lang:kotlin,tag:lang:fsharp,tag:lang:csharp,tag:lang:python,tag:lang:rust,tag:lang:elixir,tag:lang:clojure,tag:lang:dart'

  golang:
    name: Go quality gate
    needs: detect
    if: needs.detect.outputs.has-golang == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:golang'

  jvm:
    name: JVM quality gate
    needs: detect
    if: needs.detect.outputs.has-jvm == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-jvm
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:java,tag:lang:kotlin'

  dotnet:
    name: .NET quality gate
    needs: detect
    if: needs.detect.outputs.has-dotnet == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-dotnet
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:fsharp,tag:lang:csharp'

  python:
    name: Python quality gate
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-python
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:python'

  rust:
    name: Rust quality gate
    needs: detect
    if: needs.detect.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:rust'

  elixir:
    name: Elixir quality gate
    needs: detect
    if: needs.detect.outputs.has-elixir == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-elixir
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:elixir'

  clojure:
    name: Clojure quality gate
    needs: detect
    if: needs.detect.outputs.has-clojure == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-clojure
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:clojure'

  dart:
    name: Dart quality gate
    needs: detect
    if: needs.detect.outputs.has-dart == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-flutter
      - run: npx nx affected -t typecheck lint test:quick specs:coverage --projects='tag:lang:dart'

  markdown:
    name: Markdown quality gate
    needs: detect
    if: needs.detect.outputs.has-markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: npm run lint:md

  naming:
    name: Naming validators (agents + workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx run rhino-cli:naming:harness-validation
      - run: npx nx run rhino-cli:naming:workflows-validation

  env-validate:
    name: Env validate (declared vs read drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - run: npx nx run rhino-cli:env:validation

  hadolint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Install hadolint
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --version
      - run: npx nx run rhino-cli:dockerfiles:lint

  shellcheck:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      # shellcheck is preinstalled on ubuntu-latest GitHub-hosted runners.
      - run: shellcheck --version
      - run: npx nx run rhino-cli:shell:lint

  actionlint:
    name: Actions lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Install actionlint
        run: |
          curl -sSL -o /tmp/download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash
          bash /tmp/download-actionlint.bash 1.7.12 /usr/local/bin
      - run: npx nx run rhino-cli:actions:lint

  specs-gate:
    name: Specs gate (BDD spec validators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      # specs:coverage validates all .feature scenarios have test implementations
      - run: npx nx run rhino-cli:specs:coverage
      # specs:gherkin-cardinality-validation validates feature file structure
      - run: npx nx run rhino-cli:specs:gherkin-cardinality-validation
      # Note: structural set (adoption/tree/counts/links validators) added in Phase 9c

  quality-gate:
    name: Quality gate
    needs:
      [
        detect,
        format,
        typescript,
        golang,
        jvm,
        dotnet,
        python,
        rust,
        elixir,
        clojure,
        dart,
        markdown,
        naming,
        env-validate,
        hadolint,
        shellcheck,
        actionlint,
        specs-gate,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all gates
        run: |
          echo "Checking quality gate results..."
          # A skipped job is OK (language not affected). Only a failure blocks.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more quality gate jobs failed"
            exit 1
          fi
          echo "All quality gates passed"
