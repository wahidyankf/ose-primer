name: Test - Crud BE (C#/ASP.NET Core)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet
      compose-file: apps/crud-be-csharp-aspnetcore/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: crud-be-csharp-aspnetcore
      language: dotnet
      compose-dir: infra/dev/crud-be-csharp-aspnetcore
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://crud_be_csharp_aspnetcore:crud_be_csharp_aspnetcore@localhost:5432/crud_be_csharp_aspnetcore"
