name: Test - Demo BE (Kotlin/Ktor)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm
      compose-file: apps/demo-be-kotlin-ktor/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: demo-be-kotlin-ktor
      language: jvm
      compose-dir: infra/dev/demo-be-kotlin-ktor
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://demo_be_kotlin_ktor:demo_be_kotlin_ktor@localhost:5432/demo_be_kotlin_ktor"
