name: Test - Demo FE (Dart/Flutter Web)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run demo-fe-dart-flutterweb:spec-coverage
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-flutter
      - name: Generate contract types
        run: |
          npx nx run demo-contracts:bundle
          npx nx run demo-fe-dart-flutterweb:codegen
      - run: npx nx run demo-fe-dart-flutterweb:lint
  e2e-fe:
    uses: ./.github/workflows/_reusable-frontend-e2e.yml
    with:
      frontend-name: demo-fe-dart-flutterweb
      compose-dir: infra/dev/demo-fe-dart-flutterweb
      extra-language: flutter
      extra-codegen-targets: "demo-fe-ts-nextjs:codegen demo-fe-ts-tanstack-start:codegen"
      health-timeout: 600
