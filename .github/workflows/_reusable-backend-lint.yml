name: Backend - Lint

on:
  workflow_call:
    inputs:
      backend-name:
        required: true
        type: string
      language:
        required: true
        type: string
        description: "Language runtime (golang, jvm, dotnet, python, rust, elixir, clojure, typescript)"

permissions:
  contents: read

jobs:
  lint:
    name: Lint ${{ inputs.backend-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-language
        with:
          language: ${{ inputs.language }}
      - run: npx nx run ${{ inputs.backend-name }}:lint
